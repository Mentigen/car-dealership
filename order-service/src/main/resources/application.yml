spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/orderservice
    username: cardealership
    password: cardealership
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/cardealership
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

storage:
  service:
    url: http://localhost:8081

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
