spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cardealership
    username: cardealership
    password: cardealership
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml