version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cardealership-postgres

    environment:
      POSTGRES_DB: cardealership
      POSTGRES_USER: cardealership
      POSTGRES_PASSWORD: cardealership

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cardealership" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: cardealership-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./src/main/resources/keycloak:/opt/keycloak/data/import
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: